<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="200" height="200" rx="40" ry="40" fill="url(#darkGrad2)"/>
  
  <!-- Ascending path with milestones -->
  <g transform="translate(40, 40)">
    <path d="M 15 95 L 35 75 L 55 55 L 75 32 L 95 10" 
          stroke="url(#goldGrad2)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- Milestone dots -->
    <circle cx="15" cy="95" r="6" fill="#FFD700"/>
    <circle cx="35" cy="75" r="5" fill="#FFD700" opacity="0.85"/>
    <circle cx="55" cy="55" r="5" fill="#FFD700" opacity="0.85"/>
    <circle cx="75" cy="32" r="5" fill="#FFD700" opacity="0.85"/>
    
    <!-- North star at apex -->
    <g transform="translate(95, 10)">
      <path d="M 0 -14 L 3 -3 L 14 0 L 3 3 L 0 14 L -3 3 L -14 0 L -3 -3 Z" 
            fill="#FFFFFF"/>
      <circle cx="0" cy="0" r="4" fill="#FFD700"/>
    </g>
  </g>
</svg>

<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- WealthPath AI Primary Logo -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Mark: Ascending path with milestone nodes -->
  <g transform="translate(20, 20)">
    <!-- Background circle -->
    <circle cx="40" cy="40" r="40" fill="url(#darkGrad)"/>
    
    <!-- Ascending path (compass rose meets staircase) -->
    <path d="M 18 60 L 30 50 L 42 40 L 54 28 L 64 18" 
          stroke="url(#goldGrad)" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- Milestone nodes -->
    <circle cx="18" cy="60" r="3.5" fill="#FFD700"/>
    <circle cx="30" cy="50" r="3" fill="#FFD700" opacity="0.85"/>
    <circle cx="42" cy="40" r="3" fill="#FFD700" opacity="0.85"/>
    <circle cx="54" cy="28" r="3" fill="#FFD700" opacity="0.85"/>
    <circle cx="64" cy="18" r="5" fill="#FFD700"/>
    
    <!-- Star/north light at apex -->
    <g transform="translate(64, 18)">
      <path d="M 0 -8 L 1.5 -1.5 L 8 0 L 1.5 1.5 L 0 8 L -1.5 1.5 L -8 0 L -1.5 -1.5 Z" 
            fill="#FFFFFF" opacity="0.9"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(120, 0)">
    <text x="0" y="55" 
          font-family="Georgia, 'Times New Roman', serif" 
          font-size="32" 
          font-weight="700" 
          fill="#0A1628" 
          letter-spacing="-0.5">
      <tspan>Wealth</tspan><tspan fill="url(#goldGrad)">Path</tspan>
    </text>
    <text x="0" y="80" 
          font-family="'Helvetica Neue', Arial, sans-serif" 
          font-size="11" 
          font-weight="500" 
          fill="#5A6B7E" 
          letter-spacing="3">
      A I  ·  P E R S O N A L  R O A D M A P
    </text>
  </g>
</svg>
